name: Автосборка Music M with EXE NEW WWWW

on:
  workflow_dispatch:
    inputs:
      namevers:
        description: "Название релиза"
        required: true
        default: "🤖 Автосборка"
      descr:
        description: "Описание релиза"
        required: true
        default: "❌ Описание сборки отсутствует"
      release:
        description: "Выкинуть в релиз?"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Пререлиз?"
        required: true
        default: true
        type: boolean

  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    runs-on: windows-latest

    env:
      Solution_Name: "VK UI3 (Package)"
      Solution_Name_Unpacked: "VK UI3"
      Configuration_unpacked: Unpacked

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          node-version: 16
          fetch-depth: 0

      - name: Decode the pfx
        run: |
          $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          [IO.File]::WriteAllBytes("$certificatePath", $pfx_cert_byte)
          
      - name: Обновить TOKEN_STAT_SLY
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $content = Get-Content -Path "D:\a\$repoName\$repoName\VK UI3\StaticParams.cs"
          $updatedContent = $content -replace 'Environment.GetEnvironmentVariable\("TOKEN_STAT_SLY"\)', '"${{ secrets.TOKEN_STAT_SLY }}"'
          Set-Content -Path "D:\a\$repoName\$repoName\VK UI3\StaticParams.cs" -Value $updatedContent
          
      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: Извлечь версию
        id: get_version
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $csprojPath = "D:\a\$repoName\$repoName\VK UI3\VK UI3.csproj"
          $doc = New-Object xml
          $doc.Load((Convert-Path $csprojPath))
          $version = $doc.SelectSingleNode('//AppxPackageVersion').InnerText
          echo "::set-output name=VERSION::$version"

      - name: Подставить версию в Package.appxmanifest
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $csproj = "D:\a\$repoName\$repoName\VK UI3\VK UI3.csproj"
          $manifest = "D:\a\$repoName\$repoName\VK UI3 (Package)\Package.appxmanifest"
          [xml]$doc = Get-Content $csproj
          $version = $doc.SelectSingleNode('//AppxPackageVersion').InnerText.Trim()
          [xml]$xml = Get-Content $manifest
          $xml.Package.Identity.Version = $version
          $xml.Save($manifest)

      - name: Restore the application
        run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration /clp:Minimal
        env:
          Configuration: ${{ matrix.configuration }}

      - name: Get Certificate Thumbprint and Replace in Project File
        run: |
          $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          [IO.File]::WriteAllBytes("$certificatePath", $pfx_cert_byte)
          $pfxPassword = ConvertTo-SecureString -String "${{ secrets.PFX_PASSWORD }}" -AsPlainText -Force
          $pfxCert = Get-PfxCertificate -FilePath $certificatePath -Password $pfxPassword
          $projectFile = "VK UI3 (Package)/VK UI3 (Package).wapproj"
          $content = Get-Content -Path $projectFile -Raw
          $content = $content -replace '(?<=<PackageCertificateThumbprint>).+?(?=</PackageCertificateThumbprint>)', $pfxCert.Thumbprint
          Set-Content -Path $projectFile -Value $content
          
      - name: Install PFX certificate
        run: |
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          $password = ConvertTo-SecureString -String "${{ secrets.PFX_PASSWORD }}" -Force -AsPlainText
          Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\LocalMachine\My -Password $password
          
      # ШАГ 1: Сначала собираем все платформы отдельно (чтобы создать apphost.exe)
      - name: Build all platforms separately
        shell: pwsh
        run: |
          $platforms = @("x86", "x64", "ARM64")
          
          foreach ($platform in $platforms) {
            Write-Host "========================================="
            Write-Host "Pre-building for $platform"
            Write-Host "========================================="
            
            # Очищаем папки для этой платформы
            Remove-Item -Path "$env:Solution_Name_Unpacked\obj\$platform" -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -Path "$env:Solution_Name_Unpacked\bin\$platform" -Recurse -Force -ErrorAction SilentlyContinue
            
            $projectPath = "$env:Solution_Name_Unpacked\$env:Solution_Name_Unpacked.csproj"
            
            # Восстанавливаем зависимости
            dotnet restore $projectPath
            
            # Собираем с указанием платформы и RID
            dotnet build $projectPath `
              --configuration $env:Configuration `
              --runtime win-$platform `
              -p:Platform=$platform `
              -p:UseAppHost=true `
              -p:EnableNETAnalyzers=false `
              -p:WarningLevel=0 `
              -p:TreatWarningsAsErrors=false
              
            Write-Host "✓ Pre-build completed for $platform"
          }

      # ШАГ 2: Теперь создаем MSIX пакеты для всех платформ
      - name: Create MSIX packages for all platforms
        run: |
          $platforms = "x64", "x86", "ARM64"
          
          foreach ($platform in $platforms) {
            Write-Host "========================================="
            Write-Host "Creating MSIX package for $platform"
            Write-Host "========================================="
            
            $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
            
            msbuild $env:Solution_Name `
              /p:Configuration=$env:Configuration `
              /p:Platform=$platform `
              /p:UapAppxPackageBuildMode=$env:Appx_Package_Build_Mode `
              /p:AppxBundle=$env:Appx_Bundle `
              /p:PackageCertificateKeyFile="$certificatePath" `
              /p:PackageCertificatePassword="${{ secrets.PFX_PASSWORD }}" `
              /p:AppxPackageDir="$env:Appx_Package_Dir" `
              /p:GenerateAppxPackageOnBuild=true `
              /p:TOKEN_STAT_SLY="${{ secrets.TOKEN_STAT_SLY }}" `
              /p:EnableNETAnalyzers=false `
              /p:WarningLevel=0 `
              /p:TreatWarningsAsErrors=false `
              /p:AppxPackagePlatforms="$platform" `
              /clp:ErrorsOnly
          }
        env:
          Appx_Bundle: Never
          Appx_Package_Build_Mode: SideloadOnly
          Appx_Package_Dir: Packages\
          Configuration: ${{ matrix.configuration }}
          TOKEN_STAT_SLY: ${{ secrets.TOKEN_STAT_SLY }}

      - name: Remove the pfx
        run: |
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          Remove-Item -path "$certificatePath"
          
      - name: Rename the .cer file
        run: |
          Get-ChildItem -Path "${{ env.Solution_Name }}\\Packages" -Filter *.cer -Recurse -Depth 1 | ForEach-Object {
            Rename-Item -Path $_.FullName -NewName "Certificate.cer"
          }
          
      - name: Move files to the Packages folder
        run: |
          $fileTypes = "*.msix", "*.cer", "*.msixbundle"
          foreach ($fileType in $fileTypes) {
            Get-ChildItem -Path "${{ env.Solution_Name }}\\Packages" -Filter $fileType -Recurse -Depth 1 | ForEach-Object {
              $destinationFile = "${{ env.Solution_Name }}\\Packages\\" + $_.Name
              if (-Not (Test-Path -Path $destinationFile)) {
                Move-Item -Path $_.FullName -Destination $destinationFile
              }
            }
          }
          
      - name: Display MSIX files
        run: |
          Get-ChildItem -Path "${{ env.Solution_Name }}\\Packages" | ForEach-Object {
            Write-Host "Found: $($_.Name) - Size: $([math]::Round($_.Length/1MB, 2)) MB"
          }
          
      - name: Upload MSIX package
        uses: actions/upload-artifact@v4
        with:
          name: MSIX Packages
          path: |
            ${{ env.Solution_Name }}\\Packages\*.cer
            ${{ env.Solution_Name }}\\Packages\*.msixbundle
            ${{ env.Solution_Name }}\\Packages\*.msix

#-------------------------------------------------------EXE СБОРКА

      - name: Decode PFX for signing
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          $certPath = "${{ github.workspace }}\signcert.pfx"
          [IO.File]::WriteAllBytes($certPath, $bytes)

      # Сборка EXE через dotnet publish
      - name: Build EXE for all platforms
        shell: pwsh
        run: |
          $platforms = @(
            @{ Name = "x64";   RID = "win-x64"   },
            @{ Name = "x86";   RID = "win-x86"   },
            @{ Name = "ARM64"; RID = "win-arm64" }
          )
          
          foreach ($p in $platforms) {
            Write-Host "Building EXE for $($p.Name)"
            
            $projectPath = "$env:Solution_Name_Unpacked\$env:Solution_Name_Unpacked.csproj"
            
            # Публикуем в отдельную папку
            dotnet publish $projectPath `
              --configuration $env:Configuration_unpacked `
              --runtime $($p.RID) `
              --self-contained false `
              --output "publish-exe\$($p.Name)" `
              -p:UseAppHost=true `
              -p:PublishSingleFile=false `
              -p:EnableNETAnalyzers=false `
              -p:WarningLevel=0 `
              -p:TreatWarningsAsErrors=false
          }

      - name: Sign exe files
        shell: pwsh
        run: |
          $certPath = "${{ github.workspace }}\signcert.pfx"
          $password = "${{ secrets.PFX_PASSWORD }}"
          
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                      Where-Object { $_.FullName -match 'x64' } |
                      Select-Object -First 1 -ExpandProperty FullName
          
          if ($signtool -and (Test-Path $certPath)) {
            $exeFiles = Get-ChildItem -Path "publish-exe" -Recurse -Filter *.exe
            foreach ($exe in $exeFiles) {
              Write-Host "Signing: $($exe.FullName)"
              & $signtool sign /f $certPath /p $password /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe.FullName
            }
          }

      - name: Package EXE folders
        shell: pwsh
        run: |
          $platforms = @("x64", "x86", "ARM64")
          foreach ($platform in $platforms) {
            $buildDir = "publish-exe\$platform"
            if (Test-Path $buildDir) {
              $zipName = "VK_UI3_$platform.zip"
              Compress-Archive -Path "$buildDir\*" -DestinationPath $zipName -Force
              Write-Host "Created: $zipName ($([math]::Round((Get-Item $zipName).Length/1MB, 2)) MB)"
            }
          }

      - name: Upload EXE zips to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EXE_Zips_${{ github.run_id }}
          path: VK_UI3_*.zip
          retention-days: 30

#------------------------------------------
      - name: Проверить существование релиза
        id: check_release
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $headers = @{
            "Authorization" = "token ${{ secrets.TOKEN }}"
          }
          try {
            $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases" -Headers $headers
            $release = $releases | Where-Object { $_.tag_name -eq $version }
            if ($release) {
              echo "exists=true" >> $env:GITHUB_OUTPUT
            } else {
              echo "exists=false" >> $env:GITHUB_OUTPUT
            }
          } catch {
            echo "exists=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh
        if: github.event.inputs.release == 'true'
      
      - name: Создать релиз
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: ${{ github.event.inputs.namevers }}
          body: ${{ github.event.inputs.descr }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
        if: steps.check_release.outputs.exists == 'false' && github.event.inputs.release == 'true'
        
      - name: Upload EXE zips to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.TOKEN }}
          file: VK_UI3_*.zip
          tag: ${{ steps.get_version.outputs.VERSION }}
          overwrite: true
          file_glob: true
        if: steps.check_release.outputs.exists == 'false' && github.event.inputs.release == 'true'
      
      - name: Upload MSIX packages to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.TOKEN }}
          file: ${{ env.Solution_Name }}/Packages/*
          tag: ${{ steps.get_version.outputs.VERSION }}
          overwrite: true
          file_glob: true
        if: steps.check_release.outputs.exists == 'false' && github.event.inputs.release == 'true'

      - name: Отправить сообщение в Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $releaseUrl = "https://github.com/${{ github.repository }}/releases/tag/$version"
          $message = @"
          <b>🎉 Новый релиз:</b> ${{ github.event.inputs.namevers }}
          <b>📦 Версия:</b> $version
          <b>📝 Описание:</b> ${{ github.event.inputs.descr }}
          <b>🔗 <a href='$releaseUrl'>Ссылка на релиз</a></b>
          "@
          $uri = "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"
          $body = @{
              chat_id = ${{ secrets.TELEGRAM_CHAT_ID }}
              text = $message
              parse_mode = 'HTML'
          }
          Invoke-RestMethod -Uri $uri -Method Post -Body ($body | ConvertTo-Json) -ContentType 'application/json'
        if: steps.check_release.outputs.exists == 'false' && github.event.inputs.release == 'true'
